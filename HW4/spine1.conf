! spine1.conf
hostname spine1

!
interface Loopback0
   ip address 192.168.0.1/32
!
interface Ethernet1
   description Link-to-leaf1
   no switchport
   ip address 10.0.0.0/31
   bfd interval 300 min-rx 300 multiplier 3
!
interface Ethernet2
   description Link-to-leaf2
   no switchport
   ip address 10.0.0.2/31
   bfd interval 300 min-rx 300 multiplier 3
!
interface Ethernet3
   description Link-to-leaf3
   no switchport
   ip address 10.0.0.4/31
   bfd interval 300 min-rx 300 multiplier 3
!
ip routing
!
router bgp 65001
   router-id 192.168.0.1
   neighbor 10.0.0.1 remote-as 65011
   neighbor 10.0.0.1 description Link-to-leaf1
   neighbor 10.0.0.1 bfd
   neighbor 10.0.0.3 remote-as 65012
   neighbor 10.0.0.3 description Link-to-leaf2
   neighbor 10.0.0.3 bfd
   neighbor 10.0.0.5 remote-as 65013
   neighbor 10.0.0.5 description Link-to-leaf3
   neighbor 10.0.0.5 bfd
   !
   address-family ipv4
      network 192.168.0.1/32
      neighbor 10.0.0.1 activate
      neighbor 10.0.0.3 activate
      neighbor 10.0.0.5 activate
