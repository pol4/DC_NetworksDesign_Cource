! leaf3.conf
hostname leaf3

!
vlan 30
   name server3_4_vlan
!
interface Vlan30
   description Gateway-for-server3-4
   ip address 172.16.30.254/24
!
interface Ethernet3
   description Link-to-server3
   switchport mode access
   switchport access vlan 30
!
interface Ethernet4
   description Link-to-server4
   switchport mode access
   switchport access vlan 30
!
interface Loopback0
   ip address 192.168.0.103/32
!
interface Ethernet1
   description Link-to-spine1
   no switchport
   ip address 10.0.0.5/31
!
interface Ethernet2
   description Link-to-spine2
   no switchport
   ip address 10.0.0.11/31
!
ip routing
!
router bgp 65003
   router-id 192.168.0.103
   maximum-paths 32
   neighbor SPINE_PEERS peer group
   neighbor SPINE_PEERS remote-as 65000
   neighbor SPINE_PEERS update-source Loopback0
   neighbor SPINE_PEERS ebgp-multihop 2
   neighbor 192.168.0.1 peer group SPINE_PEERS
   neighbor 192.168.0.2 peer group SPINE_PEERS
   !
   address-family ipv4
      neighbor SPINE_PEERS activate
      network 172.16.30.0/24
   !
!